<script>
// Logic for Model Selector Menu
const modelBtn = document.getElementById("modelBtn");
const modelMenu = document.getElementById("modelMenu");
const selectedModel = document.getElementById("selectedModel");
const models = document.querySelectorAll(".model-item");

// Open / Close dropdown
modelBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    modelMenu.classList.toggle("show");
});

// Select model
models.forEach(model => {
    model.addEventListener("click", () => {
        let name = model.dataset.model;
        selectedModel.textContent = name;
        models.forEach(item => item.classList.remove("active"));
        model.classList.add("active");
        modelMenu.classList.remove("show");
    });
});


// Logic for Settings Panel
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

// Open/Close settings
settingsBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    settingsPanel.classList.toggle("active");
});

// Close menus when clicking outside
document.addEventListener("click", (e) => {
    // Check outside model selector
    if(!modelBtn.contains(e.target) && !modelMenu.contains(e.target)){
        modelMenu.classList.remove("show");
    }
    
    // Check outside settings panel
    if(!settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)){
        settingsPanel.classList.remove("active");
    }
});


function setTheme(mode){

    localStorage.setItem("shiva-theme",mode);


    if(mode==="light"){

        document.body.classList.add("light-theme");

    }
    else{

        document.body.classList.remove("light-theme");

    }


    updateThemeCheck(mode);

}



function updateThemeCheck(mode){

    document.getElementById("systemCheck").innerHTML="";
    document.getElementById("lightCheck").innerHTML="";
    document.getElementById("darkCheck").innerHTML="";


    if(mode==="light")
        document.getElementById("lightCheck").innerHTML="✓";


    else if(mode==="dark")
        document.getElementById("darkCheck").innerHTML="✓";


    else
        document.getElementById("systemCheck").innerHTML="✓";

}



window.onload=()=>{

let saved =
localStorage.getItem("shiva-theme") || "system";


setTheme(saved);

};
const input=document.getElementById("userInput");
const send=document.getElementById("sendBtn");
const messages=document.getElementById("messages");
let uploadedFile = null;
let uploadedFileType = null;

function addMessage(text,type){

    document
    .querySelector(".container")
    .classList.add("has-chat");


    let div=document.createElement("div");

    div.className=
    "message "+type+"-message";


    div.innerHTML =
    type==="ai"
    ? marked.parse(text)
    : text;


    messages.appendChild(div);


    messages.scrollTop=
    messages.scrollHeight;

}


async function sendMessage(){

let text=input.value.trim();

if(!text)return;


addMessage(text,"user");
saveChat(
"user",
text
);
function saveChat(role,message){


const chatRef =
firebasePush(
firebaseRef(database,"chats")
);


firebaseSet(chatRef,{

role:role,

message:message,

time:
Date.now()

});


}
input.value="";


let typing=document.createElement("div");

typing.className="message ai-message typing";

typing.innerHTML=
"Shiva AI is typing<span class='dots'>...</span>";

messages.appendChild(typing);



try{


const response =
await fetch(
"/api/chat",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

message:text,

hasFile: uploadedFile ? true : false,

fileType: uploadedFileType,

fileName: uploadedFile ? uploadedFile.name : null

})

});

typing.remove();


let aiDiv=document.createElement("div");

aiDiv.className=
"message ai-message";


messages.appendChild(aiDiv);
const reader = response.body.getReader();
const decoder = new TextDecoder();

// 1. Create a variable to hold the raw markdown text
let fullResponseText = ""; 

while(true){
    const {done,value} = await reader.read();
    if(done) break;

    const text = decoder.decode(value);
    
    // 2. Add the new chunk to your raw text variable
    fullResponseText += text; 
    
    // 3. Parse the complete raw text to HTML and replace the div's content
    aiDiv.innerHTML = marked.parse(fullResponseText);
    
    messages.scrollTop = messages.scrollHeight;
}

// 4. Save the RAW markdown text to Firebase ONLY ONCE after the loop finishes
saveChat("assistant", fullResponseText);

function loadChats(){


const chatRef =
firebaseRef(
database,
"chats"
);



firebaseOnValue(
chatRef,
(snapshot)=>{


messages.innerHTML="";


snapshot.forEach(item=>{


const data=item.val();


addMessage(
data.message,
data.role==="user"
?"user"
:"ai"
);


});


});


}



loadChats();


}catch(error){


typing.remove();


addMessage(
"Server connection failed.",
"ai"
);


}



}


send.onclick=sendMessage;
const pdfBtn=
document.getElementById("pdfBtn");

const pdfInput=
document.getElementById("pdfInput");


pdfBtn.onclick=()=>{

pdfInput.click();

};


pdfInput.onchange=async()=>{

const file =
pdfInput.files[0];

if(!file)return;


uploadedFile=file;

uploadedFileType="pdf";

let preview =
document.getElementById("filePreview");


preview.innerHTML=
`

<i class="${
file.type.startsWith("image")
?"ph ph-image"
:"ph ph-file-pdf"
}"></i>


<span class="file-name">
${file.name}
</span>

`;


preview.classList.add("show");



let form=new FormData();

form.append("pdf",file);



const response=
await fetch(
"/api/upload-pdf",
{
method:"POST",
body:form
}
);



const data=
await response.json();


addMessage(
"📚 "+data.message,
"ai"
);


};
input.addEventListener(
"keydown",
(e)=>{

if(e.key==="Enter"){
sendMessage();
}

});

</script>
